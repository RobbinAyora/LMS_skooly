version: '3.8'

services:
  db:
    image: postgres:15
    container_name: lms_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lms_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: lms_backend
    restart: always
    ports:
      - '5000:5000'
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/lms_db
      JWT_SECRET: YOUR_SECRET_HERE
      PORT: 5000
      EMAIL_USER: services@bkgconsultants.com
      EMAIL_PASS: zxwz cfqb gian gtuf
      FRONTEND_URL: https://lms-frontend-five-khaki.vercel.app/

volumes:
  postgres_data:
